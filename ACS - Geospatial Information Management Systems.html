<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>ACS | Geospatial Information Systems - Performance Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #e8f5e9; color: #1a2c3e; padding: 20px; }
        .dashboard-container { max-width: 1600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%); color: white; border-radius: 28px; padding: 20px 30px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo-area h1 i { background: #ffb347; padding: 8px; border-radius: 50%; color: #2e7d32; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 22px; margin-bottom: 30px; }
        .kpi-card { background: white; border-radius: 24px; padding: 20px; border-left: 6px solid #ffb347; }
        .kpi-value { font-size: 2.5rem; font-weight: 800; color: #2e7d32; }
        .row { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 30px; }
        .col { flex: 1; min-width: 280px; }
        .card { background: white; border-radius: 28px; padding: 20px 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); height: 100%; }
        .card h3 { border-left: 4px solid #ffb347; padding-left: 14px; }
        .btn-sm { background: #2e7d32; color: white; border: none; padding: 6px 14px; border-radius: 40px; cursor: pointer; }
        .log-stream { background: #1b3b1a; color: #a5d6a7; border-radius: 20px; padding: 15px; font-family: monospace; height: 200px; overflow-y: auto; }
        .privacy-banner { background: #c8e6c9; border-left: 6px solid #2e7d32; border-radius: 16px; padding: 16px 24px; margin-bottom: 28px; }
        .live-dot { width: 12px; height: 12px; background-color: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; display: inline-block; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
